<!DOCTYPE html><html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hillkoff Zero Waste</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#f3f8f4] min-h-screen font-sans"><div class="max-w-md mx-auto pb-24">  <!-- HEADER -->  <header class="sticky top-0 z-50 bg-[#145a32] text-white p-4 flex justify-between items-center shadow-lg">
    <div>
      <h1 class="text-2xl font-black">☕ Hillkoff</h1>
      <p class="text-xs opacity-80">Zero Waste ESG Platform</p>
    </div><div class="text-right">
  <div class="text-xs opacity-70">CO₂e Total</div>
  <div id="totalCO2" class="text-xl font-black">0.00 kg</div>
</div>

  </header>  <!-- HERO -->  <section class="p-4">
    <div class="bg-gradient-to-br from-[#145a32] to-[#1e8449] rounded-3xl p-6 text-white shadow-xl">
      <div class="text-sm opacity-80">🌍 ESG Dashboard</div>
      <div class="text-5xl font-black mt-2" id="heroCO2">0.00</div>
      <div class="mt-2 opacity-80">kg CO₂e</div><div class="grid grid-cols-2 gap-3 mt-6">
    <div class="bg-white/10 rounded-2xl p-3">
      <div class="text-xs opacity-70">Today</div>
      <div class="text-2xl font-black" id="todayLogs">0</div>
    </div>

    <div class="bg-white/10 rounded-2xl p-3">
      <div class="text-xs opacity-70">Logs</div>
      <div class="text-2xl font-black" id="totalLogs">0</div>
    </div>
  </div>
</div>

  </section>  <!-- FORM -->  <section class="px-4 space-y-4"><div class="bg-white rounded-3xl p-5 shadow-sm">
  <h2 class="text-xl font-black text-[#145a32] mb-4">📝 บันทึกขยะ</h2>

  <div class="space-y-4">

    <select id="branch" class="w-full border rounded-2xl p-3">
      <option value="">เลือกสาขา</option>
      <option>สำนักงานใหญ่</option>
      <option>ช้างเผือก</option>
      <option>มหิดล</option>
      <option>ป่าแพง</option>
      <option>ทับเดื่อ</option>
      <option>ราติก้า</option>
    </select>

    <select id="waste" class="w-full border rounded-2xl p-3">
      <option value="coffee">☕ กากกาแฟ</option>
      <option value="plastic">🧴 พลาสติก</option>
      <option value="food">🍃 เศษอาหาร</option>
      <option value="paper">📄 กระดาษ</option>
      <option value="glass">🔵 แก้ว</option>
      <option value="electronic">💻 อิเล็กทรอนิกส์</option>
    </select>

    <input
      id="qty"
      type="number"
      value="1"
      min="1"
      class="w-full border rounded-2xl p-3"
      placeholder="ปริมาณ (kg)"
    />

    <select id="method" class="w-full border rounded-2xl p-3">
      <option value="0.1">♻️ รีไซเคิล</option>
      <option value="0.05">🌱 หมักปุ๋ย</option>
      <option value="0.05">🔄 ใช้ซ้ำ</option>
      <option value="1">⛏️ ฝังกลบ</option>
      <option value="1.5">🔥 เผา</option>
    </select>

    <input type="file" class="w-full border rounded-2xl p-3 bg-white" />

    <div class="bg-[#145a32] text-white rounded-3xl p-5 text-center">
      <div class="text-sm opacity-80">CO₂e Preview</div>
      <div id="previewCO2" class="text-5xl font-black mt-2">0.49</div>
      <div class="opacity-70">kg CO₂e</div>
    </div>

    <button
      onclick="saveLog()"
      class="w-full bg-gradient-to-r from-[#145a32] to-[#1e8449] text-white rounded-2xl p-4 font-black text-lg shadow-lg"
    >
      ✅ Save Waste Log
    </button>

  </div>
</div>

  </section>  <!-- LEADERBOARD -->  <section class="p-4 space-y-4"><div class="bg-gradient-to-r from-[#145a32] to-[#1e8449] rounded-3xl p-5 text-white text-center shadow-lg">
  <div class="text-5xl">🏆</div>
  <div class="text-2xl font-black mt-2">Green Ranking</div>
</div>

<div id="leaderboard"></div>

  </section>  <!-- RECENT -->  <section class="p-4 space-y-4">
    <h2 class="text-lg font-black text-[#145a32]">📊 Recent Activity</h2><div id="logs" class="space-y-3"></div>

  </section></div><script>

const FACTORS = {
  coffee:0.49,
  plastic:2.53,
  food:0.91,
  paper:1.09,
  glass:0.31,
  electronic:20
}

const logs = JSON.parse(localStorage.getItem('hillkoff_logs') || '[]')

function calculate(){

  const waste = document.getElementById('waste').value
  const qty = Number(document.getElementById('qty').value)
  const method = Number(document.getElementById('method').value)

  const co2 = (FACTORS[waste] * qty * method).toFixed(2)

  document.getElementById('previewCO2').innerText = co2
}

function saveLog(){

  const branch = document.getElementById('branch').value
  const waste = document.getElementById('waste').value
  const qty = Number(document.getElementById('qty').value)
  const method = Number(document.getElementById('method').value)

  if(!branch){
    alert('กรุณาเลือกสาขา')
    return
  }

  const co2 = +(FACTORS[waste] * qty * method).toFixed(2)

  logs.unshift({
    branch,
    waste,
    qty,
    co2,
    date:new Date().toLocaleString('th-TH')
  })

  localStorage.setItem('hillkoff_logs', JSON.stringify(logs))

  render()

  alert('✅ บันทึกสำเร็จ')
}

function render(){

  const total = logs.reduce((s,l)=>s+l.co2,0).toFixed(2)

  document.getElementById('totalCO2').innerText = total + ' kg'
  document.getElementById('heroCO2').innerText = total
  document.getElementById('totalLogs').innerText = logs.length
  document.getElementById('todayLogs').innerText = logs.length

  const logHTML = logs.map(l=>`

    <div class="bg-white rounded-2xl p-4 shadow-sm flex justify-between items-center">

      <div>
        <div class="font-black text-[#145a32]">${l.branch}</div>
        <div class="text-sm text-gray-500">${l.waste}</div>
        <div class="text-xs text-gray-400">${l.date}</div>
      </div>

      <div class="text-right">
        <div class="text-lg font-black text-[#145a32]">${l.co2}</div>
        <div class="text-xs text-gray-500">kg CO₂e</div>
      </div>

    </div>

  `).join('')

  document.getElementById('logs').innerHTML = logHTML

  const branchScores = {}

  logs.forEach(l=>{
    if(!branchScores[l.branch]) branchScores[l.branch] = 0
    branchScores[l.branch] += l.co2
  })

  const sorted = Object.entries(branchScores)
    .sort((a,b)=>a[1]-b[1])

  const rankHTML = sorted.map((b,index)=>`

    <div class="bg-white rounded-2xl p-4 flex justify-between items-center shadow-sm mb-3">
      <div>
        <div class="font-black text-[#145a32]">#${index+1} ${b[0]}</div>
      </div>

      <div class="text-xl font-black text-[#145a32]">
        ${b[1].toFixed(2)}
      </div>
    </div>

  `).join('')

  document.getElementById('leaderboard').innerHTML = rankHTML
}

document.getElementById('waste').addEventListener('change', calculate)
document.getElementById('qty').addEventListener('input', calculate)
document.getElementById('method').addEventListener('change', calculate)

calculate()
render()

</script></body>
</html>
