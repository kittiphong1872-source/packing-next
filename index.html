/* ============================================================
   UTILITIES
============================================================ */
function calcCO2(wasteId, qtyId, disposalId) {
  const w = WASTE_TYPES.find(x => x.id === wasteId);
  const q = QUANTITIES.find(x => x.id === qtyId);
  const d = DISPOSALS.find(x => x.id === disposalId);
  if (!w || !q || !d) return 0;
  return +(w.factor * q.value * d.mult).toFixed(4);
}

function calcCarbonSaved(wasteId, qty) {
  const w = WASTE_TYPES.find(x => x.id === wasteId);
  if (!w) return 0;
  return +(w.factor * qty * 0.9).toFixed(4);
}

function dbLoad() {
  try { const v = localStorage.getItem("hk_v3_records"); return v ? JSON.parse(v) : []; }

}

function getDay(ts)   { return new Date(ts).toISOString().slice(0, 10); }
function getMonth(ts) { return new Date(ts).toISOString().slice(0, 7); }
function getYear(ts)  { return new Date(ts).getFullYear().toString(); }

function calcGreenScore(records) {
  let score = 0;
  records.forEach(r => {
    const d = DISPOSALS.find(x => x.id === r.disposalId);
    if (d?.tag === "best") score += 30;
    else if (d?.tag === "good") score += 20;
    else if (d?.tag === "warn") score += 5;
    else score -= 10;
    if (r.aiMatch) score += 10;
    if (r.hasPhoto) score += 5;
  });
  return Math.max(0, score);
}

  }
  try {

function exportCSV(records) {
  const header = ["วันที่","เวลา","สาขา","ประเภทขยะ","ปริมาณ(kg)","วิธีจัดการ","CO2e(kg)","Carbon_Saved(kg)","AI_ยืนยัน","AI_ความมั่นใจ(%)","มาตรฐาน","Green_Score"];
  const rows = records.map(r => {
    const saved = calcCarbonSaved(r.wasteType, r.qty);
    const wt = WASTE_TYPES.find(w => w.id === r.wasteType);
    return [
      new Date(r.ts).toLocaleDateString("th-TH"),
      new Date(r.ts).toLocaleTimeString("th-TH"),
      r.branchName, r.wasteLabel, r.qty, r.disposalLabel,
      r.co2e, saved, r.aiMatch ? "ใช่" : "ไม่", r.aiConf || "-",
      wt?.std || "ISO14064", r.greenScore || 0
    ];
  });
  const csv = [header, ...rows].map(r => r.join(",")).join("\n");
  const blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8;" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `Hillkoff_ESG_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(a.href);
}

function CarbonTrendChart({ records }) {
  const canvasRef = useRef(null);
  const chartRef  = useRef(null);

  useEffect(() => {
    if (!canvasRef.current) return;
    const ctx = canvasRef.current.getContext("2d");

    const last7 = Array.from({ length: 7 }, (_, i) => {
      const d = new Date(); d.setDate(d.getDate() - (6 - i));
      return d.toISOString().slice(0, 10);
    });
    const data = last7.map(day => +records.filter(r => getDay(r.ts) === day).reduce((s, r) => s + r.co2e, 0).toFixed(3));
    const labels = last7.map(d => d.slice(5));

    if (chartRef.current) chartRef.current.destroy();
    chartRef.current = new Chart(ctx, {
      type: "line",
      data: {
        labels,
        datasets: [{
          label: "CO₂e (kg)",
          data,
          borderColor: "#00ff88",
          backgroundColor: "rgba(0,255,136,0.08)",
          pointBackgroundColor: "#00ff88",
          pointBorderColor: "#050e07",
          pointRadius: 5,
          pointHoverRadius: 8,
          borderWidth: 2,
          fill: true,
          tension: 0.4,
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        animation: { duration: 1200, easing: "easeInOutQuart" },
        plugins: {
          legend: { labels: { color: "#82e0aa", font: { family: "Sarabun" } } },
          tooltip: {
            backgroundColor: "rgba(5,14,7,0.95)",
            borderColor: "#00ff88", borderWidth: 1,
            titleColor: "#00ff88", bodyColor: "#e8f5e9",
          }
        },
        scales: {
          x: { ticks: { color: "#82e0aa" }, grid: { color: "rgba(0,255,136,0.08)" } },
          y: { ticks: { color: "#82e0aa" }, grid: { color: "rgba(0,255,136,0.08)" }, beginAtZero: true },
        }
      }
    });
    return () => { if (chartRef.current) chartRef.current.destroy(); };
  }, [records]);

  return (
    <div style={{ height: 200, background: "rgba(0,255,136,0.03)", borderRadius: 14, padding: "10px", border: "1px solid rgba(0,255,136,0.15)" }}>
      <canvas ref={canvasRef} />
    </div>
  );
}

          x: { ticks: { color: "#82e0aa" }, grid: { color: "rgba(0,255,136,0.06)" } },
          y: { ticks: { color: "#82e0aa" }, grid: { color: "rgba(0,255,136,0.06)" }, beginAtZero: true },
        }
      }
    });
    return () => { if (chartRef.current) chartRef.current.destroy(); };
  }, [branchStats]);

  return (
    <div style={{ height: 180, background: "rgba(0,255,136,0.03)", borderRadius: 14, padding: "10px", border: "1px solid rgba(0,255,136,0.15)" }}>
      <canvas ref={canvasRef} />
    </div>
  );
}

function GreenScoreGauge({ score, maxScore }) {
  const canvasRef = useRef(null);
  const chartRef  = useRef(null);
  const pct = Math.min((score / Math.max(maxScore, 1)) * 100, 100);

  useEffect(() => {
    if (!canvasRef.current) return;
    const ctx = canvasRef.current.getContext("2d");
    if (chartRef.current) chartRef.current.destroy();
    chartRef.current = new Chart(ctx, {
      type: "doughnut",
      data: {
        datasets: [{
          data: [pct, 100 - pct],
          backgroundColor: ["rgba(0,255,136,0.8)", "rgba(0,255,136,0.05)"],
          borderColor: ["#00ff88", "transparent"],
          borderWidth: [2, 0],
          circumference: 270, rotation: 225,
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false, cutout: "75%",
        animation: { duration: 1500, easing: "easeInOutQuart" },
        plugins: { legend: { display: false }, tooltip: { enabled: false } }
      }
    });
    return () => { if (chartRef.current) chartRef.current.destroy(); };
  }, [pct]);

  return (
    <div style={{ position: "relative", width: 120, height: 120, margin: "0 auto" }}>
      <canvas ref={canvasRef} />
      <div style={{ position: "absolute", inset: 0, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", paddingTop: 10 }}>
        <span style={{ fontSize: 22, fontWeight: 900, color: "#00ff88" }}>{Math.round(pct)}</span>
        <span style={{ fontSize: 9, color: "#82e0aa" }}>Green Score</span>
      </div>
    </div>
  );
}

      background: `linear-gradient(135deg, rgba(0,255,136,0.05), rgba(5,14,7,0.9))`,

      borderRadius: 16,
      padding: "14px 16px",
      boxShadow: `0 0 20px ${color}11, inset 0 0 20px rgba(0,0,0,0.3)`,
      cursor: onClick ? "pointer" : "default",
      transition: "all 0.2s",
      ...style,
    }}
    onMouseEnter={e => { if (onClick) e.currentTarget.style.boxShadow = `0 0 30px ${color}33`; }}
    onMouseLeave={e => { if (onClick) e.currentTarget.style.boxShadow = `0 0 20px ${color}11, inset 0 0 20px rgba(0,0,0,0.3)`; }}
    >
      {children}
    </div>
  );
}

function KPICard({ label, value, unit, icon, color = "#00ff88", sub }) {
  return (
    <GlowCard color={color} style={{ textAlign: "center", padding: "12px 8px" }}>
      <div style={{ fontSize: 22 }}>{icon}</div>

function SectionTitle({ children, color = "#00ff88" }) {

    <div style={{ display: "flex", alignItems: "center", gap: 8, marginTop: 4 }}>
      <div style={{ width: 3, height: 16, background: color, borderRadius: 2 }} />

        {children}
      </span>
    </div>

}

function GlowButton({ children, onClick, color = "#00ff88", style = {}, disabled = false }) {
  return (
    <button
      onClick={onClick}
      disabled={disabled}
      style={{
        background: `linear-gradient(135deg, ${color}22, ${color}11)`,

        padding: "12px 20px",

        fontWeight: 700,

function ProgressBar({ value, max, color = "#00ff88", label, showPct = true }) {
  const pct = Math.min((value / Math.max(max, 0.001)) * 100, 100);
  return (
    <div>
      {label && <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
        <span style={{ fontSize: 11, color: "#82e0aa" }}>{label}</span>

// ── LOG VIEW ──
function LogView({ onAdd, showToast }) {
  const [step, setStep]             = useState(0);
  const [form, setForm]             = useState({ branch: null, waste: null, qty: null, disposal: null });
  const [photo, setPhoto]           = useState(null);
  const [photoPreview, setPhotoPreview] = useState(null);
  const [aiRes, setAiRes]           = useState(null);
  const [aiLoading, setAiLoading]   = useState(false);
  const [saving, setSaving]         = useState(false);
  const [aiBlocked, setAiBlocked]   = useState(false);
  const [dragOver, setDragOver]     = useState(false);
  const fileRef = useRef();

  const w  = WASTE_TYPES.find(x => x.id === form.waste);
  const q  = QUANTITIES.find(x => x.id === form.qty);
  const d  = DISPOSALS.find(x => x.id === form.disposal);
  const co2Preview = (form.waste && form.qty && form.disposal) ? calcCO2(form.waste, form.qty, form.disposal) : null;
  const carbonSaved = (form.waste && q) ? calcCarbonSaved(form.waste, q.value) : null;
  const canNext = [!!form.branch, !!form.waste, !!form.qty, !!form.disposal, true];

  const handleFile = (file) => {
    if (!file || !file.type.startsWith("image/")) return;
    const reader = new FileReader();
    reader.onload = ev => {
      const fullData = ev.target.result;
      setPhotoPreview(fullData);
      setPhoto(fullData.split(",")[1]);
      setAiRes(null); setAiBlocked(false);
    };
    reader.readAsDataURL(file);
  };

  const handlePhoto = (e) => handleFile(e.target.files[0]);
  const handleDrop  = (e) => { e.preventDefault(); setDragOver(false); handleFile(e.dataTransfer.files[0]); };

  const runGemini = async () => {
    if (!photo || !form.waste) return;
    setAiLoading(true);
    const result = await geminiAnalyze(photo, w?.label || "");
    setAiRes(result);
    const blocked = !result.match && result.confidence > 60;
    setAiBlocked(blocked);
    if (blocked) showToast("⚠️ AI ตรวจพบขยะไม่ตรงประเภท กรุณาแก้ไข", "err");
    setAiLoading(false);
  };

  const handleSubmit = async () => {
    if (aiBlocked) { showToast("⚠️ กรุณาแก้ไขประเภทขยะตาม AI แนะนำ", "err"); return; }
    setSaving(true);
    const branch = BRANCHES.find(b => b.id === form.branch);
    const rec = {
      id: Date.now(), ts: new Date().toISOString(),
      branchId: form.branch, branchName: branch?.name,
      wasteType: form.waste, wasteLabel: w?.label,
      qty: q?.value, disposalId: form.disposal, disposalLabel: d?.label,
      co2e: co2Preview, hasPhoto: !!photo,
      aiMatch: aiRes?.match ?? false, aiConf: aiRes?.confidence ?? null, geminiUsed: aiRes?.geminiUsed ?? false,
      greenScore: d?.tag === "best" ? 30 : d?.tag === "good" ? 20 : 5,
    };
    await onAdd(rec);
    setSaving(false);
  };

  const STEPS = ["สาขา","ประเภท","ปริมาณ","วิธีจัดการ","หลักฐาน"];

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
      {/* Progress */}
      <div style={{ display: "flex", gap: 4, alignItems: "center" }}>
        {STEPS.map((lbl, i) => (
          <div key={i} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 3 }}>
            <div style={{
              width: 26, height: 26, borderRadius: "50%",
              background: i < step ? "#00ff88" : i === step ? "#145a32" : "rgba(0,255,136,0.1)",
              border: i === step ? "2px solid #00ff88" : "2px solid transparent",
              color: i < step ? "#050e07" : i === step ? "#00ff88" : "#2d5a3d",
              display: "flex", alignItems: "center", justifyContent: "center",
              fontSize: 11, fontWeight: 700,
              boxShadow: i === step ? "0 0 12px rgba(0,255,136,0.4)" : "none",
              transition: "all 0.3s",
            }}>
              {i < step ? "✓" : i + 1}
            </div>
            <span style={{ fontSize: 8, color: i <= step ? "#00ff88" : "#2d5a3d" }}>{lbl}</span>
          </div>
        ))}
      </div>

      {/* Step 0: Branch */}
      {step === 0 && (
        <>
          <div style={{ fontSize: 18, fontWeight: 800, color: "#e8f5e9" }}>เลือกสาขา</div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: 8 }}>
            {BRANCHES.map(b => (
              <GlowCard key={b.id} color={b.color}
                style={{ textAlign: "center", padding: "14px 8px", border: `2px solid ${form.branch === b.id ? b.color : b.color + "22"}`, cursor: "pointer" }}
                onClick={() => setForm(f => ({ ...f, branch: b.id }))}>
                <div style={{ fontSize: 24 }}>{b.icon}</div>
                <div style={{ fontSize: 10, fontWeight: 700, color: form.branch === b.id ? b.color : "#82e0aa", marginTop: 4 }}>{b.name}</div>
              </GlowCard>
            ))}
          </div>
        </>
      )}

      {/* Step 1: Waste Type */}
      {step === 1 && (
        <>
          <div style={{ fontSize: 18, fontWeight: 800, color: "#e8f5e9" }}>ประเภทของเสีย</div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(2,1fr)", gap: 8 }}>
            {WASTE_TYPES.map(wt => (
              <GlowCard key={wt.id} color={wt.color}
                style={{ textAlign: "center", padding: "12px 8px", border: `2px solid ${form.waste === wt.id ? wt.color : wt.color + "22"}`, cursor: "pointer" }}
                onClick={() => setForm(f => ({ ...f, waste: wt.id }))}>
                <div style={{ fontSize: 24 }}>{wt.icon}</div>
                <div style={{ fontSize: 11, fontWeight: 700, color: form.waste === wt.id ? wt.color : "#e8f5e9", marginTop: 3 }}>{wt.label}</div>
                <div style={{ fontSize: 9, color: "#4a7a54" }}>{wt.factor} kg CO₂e/kg</div>
                <Badge text={wt.std} color={wt.color} />
              </GlowCard>
            ))}
          </div>
        </>
      )}

      {/* Step 2: Quantity */}
      {step === 2 && (
        <>
          <div style={{ fontSize: 18, fontWeight: 800, color: "#e8f5e9" }}>ปริมาณโดยประมาณ</div>
          {QUANTITIES.map(qt => (
            <GlowCard key={qt.id} color="#00ff88"
              style={{ display: "flex", alignItems: "center", gap: 12, border: `2px solid ${form.qty === qt.id ? "#00ff88" : "rgba(0,255,136,0.15)"}`, cursor: "pointer" }}
              onClick={() => setForm(f => ({ ...f, qty: qt.id }))}>
              <span style={{ fontSize: 22 }}>⚖️</span>
              <div style={{ flex: 1 }}>
                <div style={{ fontWeight: 700, fontSize: 14, color: "#e8f5e9" }}>{qt.label}</div>
                <div style={{ fontSize: 12, color: "#6b8c74" }}>{qt.sub}</div>
              </div>
              <span style={{ fontWeight: 800, fontSize: 14, color: "#00ff88", fontFamily: "monospace" }}>{qt.value} kg</span>
            </GlowCard>
          ))}
        </>
      )}

      {/* Step 3: Disposal */}
      {step === 3 && (
        <>
          <div style={{ fontSize: 18, fontWeight: 800, color: "#e8f5e9" }}>วิธีจัดการของเสีย</div>
          {DISPOSALS.map(dp => (
            <GlowCard key={dp.id} color={dp.color}
              style={{ display: "flex", alignItems: "center", gap: 12, border: `2px solid ${form.disposal === dp.id ? dp.color : dp.color + "22"}`, cursor: "pointer" }}
              onClick={() => setForm(f => ({ ...f, disposal: dp.id }))}>
              <span style={{ fontSize: 22 }}>{dp.icon}</span>
              <div style={{ flex: 1 }}>
                <div style={{ fontWeight: 700, fontSize: 14, color: "#e8f5e9" }}>{dp.label}</div>
                <div style={{ fontSize: 11, color: dp.color }}>
                  {dp.tag==="best" ? "✅ ดีที่สุด — ลด CO₂e มากที่สุด" : dp.tag==="good" ? "🟡 ดี" : dp.tag==="warn" ? "⚠️ ควรหลีกเลี่ยง" : "🔴 ผลกระทบสูงมาก"}
                </div>
              </div>
              <span style={{ fontSize: 11, color: "#6b8c74", fontFamily: "monospace" }}>×{dp.mult}</span>
            </GlowCard>
          ))}

// ── ANALYTICS VIEW ──
function AnalyticsView({ records, branchStats }) {
  const [period, setPeriod]           = useState("monthly");
  const [selectedBranch, setSelectedBranch] = useState("all");

  const filtered = selectedBranch === "all" ? records : records.filter(r => r.branchId === selectedBranch);

  const grouped = {};
  filtered.forEach(r => {
    const key = period === "daily" ? getDay(r.ts) : period === "monthly" ? getMonth(r.ts) : getYear(r.ts);
    if (!grouped[key]) grouped[key] = { co2: 0, count: 0, qty: 0, saved: 0 };
    grouped[key].co2   += r.co2e;
    grouped[key].count += 1;
    grouped[key].qty   += r.qty;
    grouped[key].saved += calcCarbonSaved(r.wasteType, r.qty);
  });

  const entries  = Object.entries(grouped).sort((a, b) => a[0].localeCompare(b[0])).slice(-12);
  const totalSaved = +filtered.reduce((s, r) => s + calcCarbonSaved(r.wasteType, r.qty), 0).toFixed(3);
  const totalCO2Filtered = +filtered.reduce((s, r) => s + r.co2e, 0).toFixed(3);
  const wasteBreak = WASTE_TYPES.map(wt => ({
    ...wt,
    total: +filtered.filter(r => r.wasteType === wt.id).reduce((s, r) => s + r.co2e, 0).toFixed(3),
    count: filtered.filter(r => r.wasteType === wt.id).length,
  })).filter(w => w.total > 0).sort((a, b) => b.total - a.total);

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
      {/* Period Toggle */}
      <div style={{ display: "flex", gap: 6 }}>
        {[["daily","รายวัน"],["monthly","รายเดือน"],["yearly","รายปี"]].map(([p, lbl]) => (
          <button key={p}
            onClick={() => setPeriod(p)}
            style={{
              flex: 1, padding: "8px 0", borderRadius: 10, fontSize: 12, cursor: "pointer",
              background: period === p ? "rgba(0,255,136,0.15)" : "transparent",
              border: `1px solid ${period === p ? "#00ff8866" : "rgba(0,255,136,0.15)"}`,
              color: period === p ? "#00ff88" : "#6b8c74", fontWeight: period === p ? 700 : 400,
            }}>{lbl}</button>
        ))}
      </div>

      {/* Branch filter */}
      <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
        <button onClick={() => setSelectedBranch("all")} style={{ padding: "4px 10px", borderRadius: 20, fontSize: 11, cursor: "pointer", background: selectedBranch === "all" ? "rgba(0,255,136,0.15)" : "transparent", border: `1px solid ${selectedBranch === "all" ? "#00ff8866" : "rgba(0,255,136,0.15)"}`, color: selectedBranch === "all" ? "#00ff88" : "#6b8c74" }}>ทุกสาขา</button>
        {BRANCHES.map(b => (
          <button key={b.id} onClick={() => setSelectedBranch(b.id)} style={{ padding: "4px 10px", borderRadius: 20, fontSize: 11, cursor: "pointer", background: selectedBranch === b.id ? b.color + "22" : "transparent", border: `1px solid ${selectedBranch === b.id ? b.color + "66" : "rgba(0,255,136,0.15)"}`, color: selectedBranch === b.id ? b.color : "#6b8c74" }}>{b.icon} {b.short}</button>
        ))}
      </div>

      {/* Summary KPIs */}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(2,1fr)", gap: 8 }}>
        <KPICard label="CO₂e รวม" value={totalCO2Filtered} unit="kg" icon="💨" color="#ff6b6b" />
        <KPICard label="Carbon Saved" value={totalSaved} unit="kg" icon="💚" color="#00ff88" />
      </div>

      {/* Trend Chart */}
      <SectionTitle>Carbon Trend</SectionTitle>
      <CarbonTrendChart records={filtered} />

      {/* Pie Chart */}
      <SectionTitle>แยกตามประเภทขยะ</SectionTitle>
      <WastePieChart records={filtered} />

      {/* Branch Bar */}
      <SectionTitle>เปรียบเทียบสาขา</SectionTitle>
      <BranchBarChart branchStats={branchStats} />

      {/* Breakdown list */}
      <SectionTitle>รายละเอียด CO₂e</SectionTitle>
      {wasteBreak.map(w => (
        <GlowCard key={w.id} color={w.color} style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <span style={{ fontSize: 22 }}>{w.icon}</span>
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 12, fontWeight: 700, color: "#e8f5e9" }}>{w.label}</div>
            <ProgressBar value={w.total} max={totalCO2Filtered || 1} color={w.color} showPct={false} />
            <div style={{ fontSize: 9, color: "#6b8c74", marginTop: 3 }}>{w.std} · factor {w.factor} · {w.count} รายการ</div>
          </div>
          <div style={{ fontWeight: 800, fontSize: 13, color: w.color, fontFamily: "monospace" }}>{w.total} kg</div>
        </GlowCard>
      ))}
      {wasteBreak.length === 0 && <EmptyState />}
    </div>
  );
}

    period === "monthly" ? records.filter(r => getMonth(r.ts) === getMonth(Date.now())) :
    records.filter(r => getYear(r.ts) === getYear(Date.now()));

  const fStats = BRANCHES.map(b => {
    const recs = filtered.filter(r => r.branchId === b.id);
    return { ...b, count: recs.length, totalQty: recs.reduce((s, r) => s + r.qty, 0), co2: +recs.reduce((s, r) => s + r.co2e, 0).toFixed(4) };

        {[
          ["รายการทั้งหมด", `${filtered.length} รายการ`],
          ["tCO₂e", `${(fTotal * 0.001).toFixed(6)} t`],
          ["Gemini Vision", `${filtered.filter(r => r.geminiUsed).length} รายการ`],
          ["สาขาที่ดีที่สุด", branchStats.reduce((a, b) => a.co2 < b.co2 ? a : b, branchStats[0])?.name || "—"],
        ].map(([k, v]) => (
          <div key={k} style={{ display: "flex", justifyContent: "space-between", padding: "4px 0", borderBottom: "1px solid rgba(0,229,255,0.08)" }}>
            <span style={{ fontSize: 11, color: "#6b8c74" }}>{k}</span>
            <span style={{ fontSize: 11, fontWeight: 700, color: "#e8f5e9" }}>{v}</span>
          </div>

      </GlowCard>

      {/* Export Buttons */}
      <SectionTitle color="#00e5ff">ส่งออกรายงาน</SectionTitle>
      <GlowButton onClick={() => exportCSV(filtered)} color="#00ff88">
        📊 Export CSV (Excel / Google Sheets)
      </GlowButton>
      <GlowButton onClick={() => exportPDFReport(filtered, fStats, fTotal)} color="#00e5ff">
        📄 Export PDF (ISO 14064 Report)
      </GlowButton>

      {/* Email */}
      <SectionTitle color="#c084fc">📧 ส่งรายงานทาง Email</SectionTitle>
      <GlowCard color="#c084fc">
        <div style={{ fontSize: 11, color: "#6b8c74", marginBottom: 10 }}>ส่งรายงาน ESG สรุปให้ผู้บริหาร (โหมด Demo)</div>
        <input
          value={emailTo}
          onChange={e => setEmailTo(e.target.value)}
          placeholder="อีเมลผู้รับ เช่น ceo@hillkoff.com"
          type="email"
          style={{
            width: "100%", padding: "10px 12px", marginBottom: 10,
            background: "rgba(0,0,0,0.4)", border: "1px solid rgba(192,132,252,0.3)",
            borderRadius: 10, color: "#e8f5e9", fontSize: 13, outline: "none",
          }}
        />
        <GlowButton onClick={handleEmail} disabled={sending} color="#c084fc">
          {sending ? "📧 กำลังส่ง..." : "📧 ส่ง ESG Report"}
        </GlowButton>
      </GlowCard>

      {/* Standards */}
      <SectionTitle color="#00e5ff">มาตรฐานสากล</SectionTitle>
      {[
        ["ISO 14064-1:2018","วัดก๊าซเรือนกระจกระดับองค์กร","#00e5ff"],
        ["GHG Protocol","Carbon Footprint Scope 1-2-3","#00ff88"],
        ["WEEE 2012/19/EU","จัดการขยะอิเล็กทรอนิกส์","#ffd93d"],
        ["UN SDG Goal 12","การผลิตและบริโภคที่ยั่งยืน","#c084fc"],
        ["SBTi","Science Based Targets Initiative","#ff6b6b"],
      ].map(([std, desc, col]) => (
        <div key={std} style={{ display: "flex", gap: 10, alignItems: "flex-start" }}>
          <Badge text={std} color={col} />
          <span style={{ fontSize: 10, color: "#6b8c74", flex: 1 }}>{desc}</span>
        </div>
      ))}

      {/* Branch breakdown */}
      <SectionTitle color="#00e5ff">สรุปแยกสาขา</SectionTitle>
      {fStats.map(b => (
        <GlowCard key={b.id} color={b.color} style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <span style={{ fontSize: 20 }}>{b.icon}</span>
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 12, fontWeight: 700, color: "#e8f5e9" }}>{b.name}</div>
            <div style={{ fontSize: 9, color: "#6b8c74" }}>{b.count} รายการ · {b.totalQty.toFixed(1)} kg</div>
            <ProgressBar value={b.co2} max={fTotal || 1} color={b.color} showPct={false} />
          </div>
          <div style={{ fontWeight: 800, fontSize: 13, color: b.color, fontFamily: "monospace" }}>{b.co2} kg</div>
        </GlowCard>
      ))}
    </div>
  );
}

// ── IOT VIEW ──
function IoTView({ records }) {
  const [bins, setBins] = useState(SMART_BINS);
  const totalCarbonSaved = +records.reduce((s, r) => s + calcCarbonSaved(r.wasteType, r.qty), 0).toFixed(3);
  const totalCO2 = +records.reduce((s, r) => s + r.co2e, 0).toFixed(3);
  const creditEst = +(totalCarbonSaved * 0.5).toFixed(2);
  const greenScore = calcGreenScore(records);

  const [coachLoading, setCoachLoading] = useState(false);
  const [coachMsg, setCoachMsg]         = useState("");

  const loadCoach = async () => {
    setCoachLoading(true);
    const msg = await geminiCoach(records, totalCO2);
    setCoachMsg(msg);
    setCoachLoading(false);
  };

  const simulateFill = () => {
    setBins(b => b.map(bin => {
      const newFill = Math.min(100, bin.fill + Math.floor(Math.random() * 15));
      return { ...bin, fill: newFill, status: newFill > 80 ? "critical" : newFill > 60 ? "warn" : "ok" };
    }));
  };

  const STATUS_COLORS = { ok: "#00ff88", warn: "#ffd93d", critical: "#ff6b6b" };

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
      {/* Header */}
      <GlowCard color="#00e5ff" style={{ textAlign: "center" }}>
        <div style={{ fontSize: 13, color: "#00e5ff", letterSpacing: 1 }}>🌐 IoT & AI PLATFORM</div>
        <div style={{ fontSize: 11, color: "#6b8c74", marginTop: 2 }}>Smart Monitoring · Carbon Credit · AI Coach</div>
      </GlowCard>

      {/* IoT Smart Bins */}
      <SectionTitle color="#00e5ff">Smart Bin Monitoring</SectionTitle>
      <div style={{ display: "flex", justifyContent: "flex-end" }}>
        <button onClick={simulateFill} style={{ padding: "6px 12px", borderRadius: 8, border: "1px solid rgba(0,229,255,0.3)", background: "transparent", color: "#00e5ff", fontSize: 11, cursor: "pointer" }}>
          🔄 Simulate Sensor Update
        </button>
      </div>
      {bins.map(bin => (
        <GlowCard key={bin.id} color={STATUS_COLORS[bin.status]}>
          <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 8 }}>
            <span style={{ fontSize: 26 }}>{bin.icon}</span>
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 13, fontWeight: 700, color: "#e8f5e9" }}>{bin.name}</div>
              <div style={{ fontSize: 10, color: "#6b8c74" }}>{bin.location}</div>
            </div>
            <StatusDot status={bin.status} />
          </div>
          <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 6 }}>
            <span style={{ fontSize: 11, color: "#82e0aa" }}>ระดับความเต็ม</span>
            <span style={{ fontSize: 12, fontWeight: 800, color: STATUS_COLORS[bin.status], fontFamily: "monospace" }}>{bin.fill}%</span>
          </div>
          <ProgressBar value={bin.fill} max={100} color={STATUS_COLORS[bin.status]} showPct={false} />
          {bin.status === "critical" && (
            <div style={{ marginTop: 8, padding: "6px 10px", background: "rgba(255,107,107,0.15)", borderRadius: 8, fontSize: 11, color: "#ff6b6b" }}>
              🚨 ต้องเก็บขยะด่วน! ถังเต็มแล้ว {bin.fill}%
            </div>
          )}
        </GlowCard>
      ))}

      {/* Carbon Credit */}
      <SectionTitle color="#ffd93d">Carbon Credit Dashboard</SectionTitle>
      <GlowCard color="#ffd93d" style={{ textAlign: "center" }}>
        <GreenScoreGauge score={greenScore} maxScore={Math.max(greenScore, 500)} />
        <div style={{ display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: 8, marginTop: 12 }}>
          <div style={{ background: "rgba(255,217,61,0.08)", borderRadius: 10, padding: "8px 4px", textAlign: "center" }}>
            <div style={{ fontSize: 15, fontWeight: 800, color: "#ffd93d", fontFamily: "monospace" }}>{totalCarbonSaved}</div>
            <div style={{ fontSize: 9, color: "#6b8c74" }}>kg CO₂ Saved</div>
          </div>
          <div style={{ background: "rgba(255,217,61,0.08)", borderRadius: 10, padding: "8px 4px", textAlign: "center" }}>
            <div style={{ fontSize: 15, fontWeight: 800, color: "#ffd93d", fontFamily: "monospace" }}>{creditEst}</div>
            <div style={{ fontSize: 9, color: "#6b8c74" }}>Carbon Credits (est.)</div>
          </div>
          <div style={{ background: "rgba(255,217,61,0.08)", borderRadius: 10, padding: "8px 4px", textAlign: "center" }}>
            <div style={{ fontSize: 15, fontWeight: 800, color: "#ffd93d", fontFamily: "monospace" }}>{greenScore}</div>
            <div style={{ fontSize: 9, color: "#6b8c74" }}>Sustainability Score</div>
          </div>
        </div>
        <div style={{ marginTop: 12, fontSize: 10, color: "#6b8c74" }}>
          อ้างอิง: Verra VCS Standard · Gold Standard · Thailand Carbon Market
        </div>
      </GlowCard>

      {/* Circular Economy */}
      <SectionTitle color="#4ade80">Circular Economy</SectionTitle>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(2,1fr)", gap: 8 }}>
        {[
          { icon:"♻️", label:"วัสดุรีไซเคิล", value:`${records.filter(r=>r.disposalId==="recycle").length} รายการ`, color:"#00ff88" },
          { icon:"🌱", label:"ปุ๋ยหมัก", value:`${records.filter(r=>r.disposalId==="compost").length} รายการ`, color:"#4ade80" },
          { icon:"🔄", label:"Reuse", value:`${records.filter(r=>r.disposalId==="reuse").length} รายการ`, color:"#ffd93d" },
          { icon:"📦", label:"วัสดุกู้คืน", value:`${(totalCarbonSaved*0.8).toFixed(1)} kg`, color:"#00e5ff" },
        ].map(item => (
          <KPICard key={item.label} label={item.label} value={item.value} unit="" icon={item.icon} color={item.color} />
        ))}
      </div>

      {/* Marketplace mockup */}
      <GlowCard color="#4ade80">
        <div style={{ fontSize: 12, fontWeight: 700, color: "#4ade80", marginBottom: 10 }}>🏪 Recycling Marketplace</div>
        {[
          { item:"กากกาแฟ", qty:"50 kg", price:"฿150", buyer:"ฟาร์มอินทรีย์เชียงใหม่", status:"เสนอซื้อ" },
          { item:"พลาสติก HDPE", qty:"20 kg", price:"฿80", buyer:"โรงงาน Recycle", status:"รอยืนยัน" },
          { item:"กระดาษลัง", qty:"100 kg", price:"฿200", buyer:"โรงงานกระดาษ", status:"สำเร็จ" },
        ].map((m, i) => (
          <div key={i} style={{ display: "flex", alignItems: "center", gap: 8, padding: "7px 0", borderBottom: i < 2 ? "1px solid rgba(74,222,128,0.1)" : "none" }}>
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 12, fontWeight: 700, color: "#e8f5e9" }}>{m.item} · {m.qty}</div>
              <div style={{ fontSize: 10, color: "#6b8c74" }}>{m.buyer}</div>
            </div>
            <div style={{ textAlign: "right" }}>
              <div style={{ fontSize: 12, fontWeight: 800, color: "#4ade80" }}>{m.price}</div>
              <Badge text={m.status} color={m.status === "สำเร็จ" ? "#00ff88" : m.status === "รอยืนยัน" ? "#ffd93d" : "#00e5ff"} />
            </div>
          </div>
        ))}
      </GlowCard>

      {/* AI Coach */}
      <SectionTitle color="#c084fc">🤖 AI Sustainability Coach</SectionTitle>
      <GlowCard color="#c084fc">
        {coachMsg ? (
          <div style={{ fontSize: 12, color: "#e8f5e9", lineHeight: 1.8 }}>
            <div style={{ fontSize: 10, color: "#c084fc", marginBottom: 6 }}>💡 คำแนะนำจาก Gemini AI</div>
            {coachMsg}
          </div>
        ) : (
          <div style={{ textAlign: "center" }}>
            <div style={{ fontSize: 32, marginBottom: 8 }}>🤖</div>
            <div style={{ fontSize: 12, color: "#6b8c74", marginBottom: 12 }}>ให้ AI วิเคราะห์พฤติกรรมการจัดการขยะของคุณ และให้คำแนะนำแบบเฉพาะบุคคล</div>
            <GlowButton onClick={loadCoach} disabled={coachLoading} color="#c084fc">
              {coachLoading ? "🤖 AI กำลังวิเคราะห์..." : "🤖 ขอคำแนะนำจาก AI Coach"}
            </GlowButton>
          </div>
        )}
        {coachMsg && (
          <div style={{ marginTop: 10 }}>
            <GlowButton onClick={() => { setCoachMsg(""); }} color="#c084fc" style={{ padding: "8px", fontSize: 11 }}>
              🔄 ขอคำแนะนำใหม่
            </GlowButton>
          </div>
        )}
      </GlowCard>

      {/* AI Insights */}
      <SectionTitle color="#c084fc">AI Insights</SectionTitle>
      {[
        { icon:"⚠️", title:"แจ้งเตือน", msg:`Bin C มหิดล เต็ม 88% ควรเก็บก่อน 16:00`, color:"#ff6b6b" },
        { icon:"📈", title:"Predict Waste Trend", msg:`คาดการณ์: สัปดาห์หน้ากากกาแฟจะเพิ่ม 15% จากกิจกรรม HQ`, color:"#ffd93d" },
        { icon:"💡", title:"Smart Recommendation", msg:`หมักปุ๋ยจากกากกาแฟสามารถลด CO₂e ได้ถึง ${(records.length * 0.15).toFixed(1)} kg/เดือน`, color:"#00ff88" },
        { icon:"🌍", title:"Sustainability Insight", msg:`Hillkoff อยู่ใน Top 20% ขององค์กรที่มีคะแนน ESG ดีในกลุ่ม F&B`, color:"#00e5ff" },
      ].map(item => (
        <GlowCard key={item.title} color={item.color} style={{ display: "flex", gap: 10, alignItems: "flex-start" }}>
          <span style={{ fontSize: 20 }}>{item.icon}</span>
          <div>
            <div style={{ fontSize: 11, fontWeight: 700, color: item.color, marginBottom: 3 }}>{item.title}</div>
            <div style={{ fontSize: 11, color: "#82e0aa", lineHeight: 1.6 }}>{item.msg}</div>
          </div>
        </GlowCard>
      ))}
    </div>
  );
}

/* ============================================================
   MAIN APP
============================================================ */
function App() {
  const [view, setView]     = useState("home");
  const [records, setRecords] = useState([]);
  const [logKey, setLogKey] = useState(0);
  const [toast, setToast]   = useState(null);

  useEffect(() => { setRecords(dbLoad()); }, []);

  const showToast = (msg, type = "ok") => {
    setToast({ msg, type });
    setTimeout(() => setToast(null), 3500);
  };

  const addRecord = async (rec) => {
    const updated = [rec, ...records];
    setRecords(updated);
    dbSave(updated);
    showToast("✅ บันทึกสำเร็จ!");
    setView("home");
  };

  const branchStats = BRANCHES.map(b => {
    const recs = records.filter(r => r.branchId === b.id);
    return { ...b, count: recs.length, totalQty: recs.reduce((s, r) => s + r.qty, 0), co2: +recs.reduce((s, r) => s + r.co2e, 0).toFixed(4) };
  });
  const totalCO2 = +branchStats.reduce((s, b) => s + b.co2, 0).toFixed(4);

  const TABS = [
    { id:"home",      icon:"🏠", label:"หน้าหลัก" },
    { id:"log",       icon:"📝", label:"บันทึก" },
    { id:"analytics", icon:"📊", label:"Analytics" },
    { id:"ranking",   icon:"🏆", label:"Ranking" },
    { id:"report",    icon:"📋", label:"รายงาน" },
    { id:"iot",       icon:"🤖", label:"AI·IoT" },
  ];

  return (
    <div style={{ minHeight: "100vh", fontFamily: "'Sarabun','Noto Sans Thai',sans-serif", background: "#050e07", paddingBottom: 80, position: "relative" }}>
      {/* BG Grid */}
      <div style={{
        position: "fixed", inset: 0, zIndex: 0,
        backgroundImage: "linear-gradient(rgba(0,255,136,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,255,136,0.03) 1px, transparent 1px)",
        backgroundSize: "40px 40px",
        pointerEvents: "none",
      }} />

      {/* Toast */}
      {toast && (
        <div style={{
          position: "fixed", top: 16, left: "50%", transform: "translateX(-50%)",
          zIndex: 999, color: "#050e07", fontWeight: 700, fontSize: 13,
          padding: "10px 24px", borderRadius: 30,
          background: toast.type === "ok" ? "#00ff88" : "#ff6b6b",
          boxShadow: `0 4px 20px ${toast.type === "ok" ? "rgba(0,255,136,0.4)" : "rgba(255,107,107,0.4)"}`,
          whiteSpace: "nowrap",
        }}>
          {toast.msg}
        </div>
      )}

      {/* Header */}
      <header style={{
        position: "sticky", top: 0, zIndex: 100,
        background: "rgba(5,14,7,0.95)", backdropFilter: "blur(20px)",
        borderBottom: "1px solid rgba(0,255,136,0.15)",
        padding: "10px 16px",
        display: "flex", alignItems: "center", justifyContent: "space-between",
      }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <span style={{ fontSize: 24 }}>☕</span>
          <div>
            <div style={{ fontSize: 17, fontWeight: 900, color: "#00ff88", letterSpacing: 1, fontFamily: "'Space Mono', monospace" }}>HILLKOFF</div>
            <div style={{ fontSize: 8.5, color: "#2d5a3d", letterSpacing: 1.5 }}>ZERO WASTE · ESG PLATFORM</div>
          </div>
        </div>
        <div style={{ textAlign: "right" }}>
          <div style={{ fontSize: 9, color: "#2d5a3d" }}>CO₂e รวม</div>
          <div style={{ fontSize: 16, fontWeight: 800, color: "#00ff88", fontFamily: "monospace" }}>{totalCO2.toFixed(2)} kg</div>
        </div>
      </header>

      {/* Content */}
      <main style={{ position: "relative", zIndex: 1, padding: "16px 14px 16px" }}>
        {view === "home"      && <HomeView      branchStats={branchStats} totalCO2={totalCO2} records={records} onLog={() => { setLogKey(k => k + 1); setView("log"); }} />}
        {view === "log"       && <LogView       key={logKey} onAdd={addRecord} showToast={showToast} />}
        {view === "analytics" && <AnalyticsView records={records} branchStats={branchStats} />}
        {view === "ranking"   && <LeaderboardView branchStats={branchStats} totalCO2={totalCO2} records={records} />}
        {view === "report"    && <ReportView    records={records} branchStats={branchStats} totalCO2={totalCO2} showToast={showToast} />}
        {view === "iot"       && <IoTView       records={records} />}
      </main>

      {/* Bottom Nav */}
      <nav style={{
        position: "fixed", bottom: 0, left: 0, right: 0, zIndex: 100,
        background: "rgba(5,14,7,0.98)", backdropFilter: "blur(20px)",
        borderTop: "1px solid rgba(0,255,136,0.15)",
        display: "flex",
      }}>
        {TABS.map(t => (
          <button key={t.id}
            onClick={() => { if (t.id === "log") setLogKey(k => k + 1); setView(t.id); }}
            style={{
              flex: 1, padding: "8px 0", display: "flex", flexDirection: "column",
              alignItems: "center", gap: 1, background: "none", border: "none", cursor: "pointer",
              color: view === t.id ? "#00ff88" : "#2d5a3d",
              borderTop: view === t.id ? "2px solid #00ff88" : "2px solid transparent",
              transition: "all 0.2s",
            }}>
            <span style={{ fontSize: 18 }}>{t.icon}</span>
            <span style={{ fontSize: 8.5 }}>{t.label}</span>
          </button>
        ))}
      </nav>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
