<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>Hillkoff Zero Waste Enterprise Platform</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700;800;900&display=swap" rel="stylesheet" />

<!-- React & Babel -->
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- jsPDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
  :root {
    --primary: #145a32; --secondary: #27ae60; --dark: #1a3a2a; --light: #f0f7f2;
    --danger: #e74c3c; --warning: #f1c40f; --glass: rgba(255, 255, 255, 0.9);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Sarabun', sans-serif; }
  body { background: var(--light); color: var(--dark); overflow-x: hidden; }
  
  /* Layout & Animations */
  .app-container { min-height: 100vh; padding-bottom: 80px; }
  .fade-in { animation: fadeIn 0.4s ease-in-out; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  
  /* Glow & Gradient Styles for Charts & Cards */
  .glass-card {
    background: var(--glass); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.4);
    border-radius: 16px; padding: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.05);
  }
  .glow-box { position: relative; }
  .glow-box::before {
    content: ''; position: absolute; top: -2px; left: -2px; right: -2px; bottom: -2px;
    background: linear-gradient(45deg, #27ae60, #145a32, #2ecc71); z-index: -1;
    border-radius: 18px; filter: blur(10px); opacity: 0.5; animation: pulseGlow 3s infinite alternate;
  }
  @keyframes pulseGlow { 0% { opacity: 0.3; } 100% { opacity: 0.7; } }
  
  /* UI Components */
  .btn-primary { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; padding: 12px 20px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 15px rgba(39, 174, 96, 0.4); }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(39, 174, 96, 0.6); }
  .btn-outline { background: transparent; border: 2px solid var(--primary); color: var(--primary); padding: 10px 16px; border-radius: 12px; font-weight: 700; cursor: pointer; }
  
  /* Progress Bar */
  .progress-bg { background: #e0e0e0; height: 8px; border-radius: 4px; overflow: hidden; width: 100%; }
  .progress-fill { background: linear-gradient(90deg, #f1c40f, #27ae60); height: 100%; transition: width 0.5s ease; }
  
  /* Modals */
  .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); z-index: 1000; display: flex; align-items: center; justify-content: center; }
  .modal-content { background: white; width: 90%; max-width: 400px; border-radius: 20px; padding: 24px; animation: fadeIn 0.3s; }
  
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  
  /* Drag & Drop Zone */
  .drop-zone { border: 2px dashed #27ae60; border-radius: 16px; padding: 30px; text-align: center; background: #e8f5e9; cursor: pointer; transition: 0.2s; }
  .drop-zone:hover { background: #d5f5e3; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useMemo } = React;

// --- CONSTANTS & CONFIG ---
const GEMINI_KEY = ""; // ใส่ API Key จริงที่นี่เพื่อใช้งาน Phase 3 สมบูรณ์

const WASTE_TYPES = [
  { id: "plastic",        label: "Plastic",         icon: "🧴", factor: 0.4 },
  { id: "coffee_waste",   label: "Coffee Waste",    icon: "☕", factor: 0.2 },
  { id: "aluminium",      label: "Aluminium",       icon: "🥫", factor: 1.2 },
  { id: "glass",          label: "Glass",           icon: "🔵", factor: 0.3 },
  { id: "paper",          label: "Paper",           icon: "📄", factor: 0.5 },
  { id: "food_waste",     label: "Food Waste",      icon: "🍃", factor: 0.6 },
  { id: "general_waste",  label: "General Waste",   icon: "🗑️", factor: 0.1 },
];

const BRANCHES = [
  { id: "hq", name: "HQ", icon: "🏢" }, { id: "mahidol", name: "Mahidol", icon: "📍" },
  { id: "paphaeng", name: "Pa Phaeng", icon: "📍" }
];

const EMPLOYEES = [
  { id: "e1", name: "Somchai K.", branch: "hq" }, { id: "e2", name: "Wipa D.", branch: "hq" },
  { id: "e3", name: "Anuwat S.", branch: "mahidol" }, { id: "e4", name: "Nidnoi T.", branch: "paphaeng" }
];

// --- DATABASE SIMULATION (localStorage) ---
function loadDB() { try { return JSON.parse(localStorage.getItem("hk_ent_db")) || []; } catch { return []; } }
function saveDB(data) { localStorage.setItem("hk_ent_db", JSON.stringify(data)); }

// --- REUSABLE COMPONENTS ---
const ChartCanvas = ({ type, data, options, height = 200 }) => {
  const canvasRef = useRef(null);
  const chartRef = useRef(null);

  useEffect(() => {
    if (!canvasRef.current) return;
    const ctx = canvasRef.current.getContext('2d');
    if (chartRef.current) chartRef.current.destroy();
    
    // Apply Glow via Canvas shadow
    ctx.shadowColor = 'rgba(39, 174, 96, 0.4)';
    ctx.shadowBlur = 10;
    ctx.shadowOffsetX = 0;
    ctx.shadowOffsetY = 4;

    chartRef.current = new Chart(ctx, { type, data, options });
    return () => { if (chartRef.current) chartRef.current.destroy(); }
  }, [data, type, options]);

  return <canvas ref={canvasRef} height={height} style={{ width: '100%', filter: 'drop-shadow(0 4px 6px rgba(0,0,0,0.1))' }} />;
};

// --- PHASE 2: SMART ANALYTICS DASHBOARD ---
const DashboardView = ({ records }) => {
  // KPI Calculations
  const totalCarbon = records.reduce((s, r) => s + r.carbonSaved, 0);
  const totalWaste = records.reduce((s, r) => s + r.qty, 0);
  const greenScore = Math.min(100, Math.floor((totalCarbon / 500) * 100)); // Target 500kg

  // Chart Data Preparation
  const wasteTypeData = WASTE_TYPES.map(wt => records.filter(r => r.wasteType === wt.id).reduce((s, r) => s + r.qty, 0));
  
  const lineChartData = {
    labels: ['W1', 'W2', 'W3', 'W4'], // Simulated timeline for demo
    datasets: [{
      label: 'Carbon Saved Trend (kgCO2e)',
      data: [10, 25, 45, totalCarbon || 50], 
      borderColor: '#27ae60',
      backgroundColor: 'rgba(39, 174, 96, 0.2)',
      tension: 0.4, fill: true,
      pointBackgroundColor: '#fff', pointBorderColor: '#27ae60', pointRadius: 5
    }]
  };

  const pieChartData = {
    labels: WASTE_TYPES.map(w => w.label),
    datasets: [{
      data: wasteTypeData,
      backgroundColor: ['#3498db', '#e67e22', '#95a5a6', '#2ecc71', '#f1c40f', '#e74c3c', '#bdc3c7']
    }]
  };

  // Ranking System
  const branchRanking = BRANCHES.map(b => ({
    ...b,
    score: records.filter(r => r.branchId === b.id).reduce((s, r) => s + r.carbonSaved, 0)
  })).sort((a, b) => b.score - a.score);

  const employeeRanking = EMPLOYEES.map(e => ({
    ...e,
    score: records.filter(r => r.empId === e.id).reduce((s, r) => s + r.carbonSaved, 0)
  })).sort((a, b) => b.score - a.score);

  // Export System (Phase 2 Requirement)
  const handleExportCSV = () => {
    const header = "Date,Employee,Branch,Waste Type,Qty(kg),Carbon Saved(kgCO2e)\n";
    const rows = records.map(r => `${new Date(r.ts).toLocaleDateString()},${r.empName},${r.branchName},${r.wasteLabel},${r.qty},${r.carbonSaved.toFixed(2)}`).join("\n");
    const blob = new Blob(["\uFEFF" + header + rows], { type: "text/csv;charset=utf-8;" });
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob); link.download = "Eco_Analytics.csv"; link.click();
  };

  const handleExportPDF = () => {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    doc.setFontSize(20);
    doc.text("Zero Waste Analytics Report", 20, 20);
    doc.setFontSize(12);
    doc.text(`Total Carbon Saved: ${totalCarbon.toFixed(2)} kgCO2e`, 20, 35);
    doc.text(`Total Waste Processed: ${totalWaste.toFixed(2)} kg`, 20, 45);
    doc.text(`Corporate Green Score: ${greenScore}%`, 20, 55);
    
    doc.text("Top Branches:", 20, 75);
    branchRanking.forEach((b, i) => doc.text(`${i+1}. ${b.name} - ${b.score.toFixed(2)} kgCO2e`, 25, 85 + (i*10)));
    
    doc.save("ESG_Report.pdf");
  };

  return (
    <div className="fade-in" style={{ display: 'flex', flexDirection: 'column', gap: '20px' }}>
      <h2 style={{ color: 'var(--primary)', borderBottom: '3px solid var(--primary)', paddingBottom: '8px' }}>📊 Smart Dashboard</h2>
      
      {/* KPIs */}
      <div className="grid-2">
        <div className="glass-card glow-box" style={{ background: 'linear-gradient(135deg, #145a32, #1e8449)', color: 'white' }}>
          <div style={{ fontSize: 12, opacity: 0.8 }}>Carbon Saved KPI</div>
          <div style={{ fontSize: 28, fontWeight: 900 }}>{totalCarbon.toFixed(2)} <span style={{ fontSize:14 }}>kgCO2e</span></div>
        </div>
        <div className="glass-card">
          <div style={{ fontSize: 12, color: 'var(--primary)' }}>Green Score</div>
          <div style={{ fontSize: 28, fontWeight: 900, color: 'var(--primary)' }}>{greenScore}%</div>
          <div className="progress-bg"><div className="progress-fill" style={{ width: `${greenScore}%` }} /></div>
        </div>
      </div>

      {/* Realtime Charts */}
      <div className="glass-card">
        <h4 style={{ marginBottom: '10px', color: 'var(--dark)' }}>📈 Carbon Trend</h4>
        <ChartCanvas type="line" data={lineChartData} options={{ responsive: true, animation: { duration: 2000, easing: 'easeOutQuart' } }} />
      </div>
      
      <div className="grid-2">
        <div className="glass-card">
          <h4 style={{ marginBottom: '10px', fontSize: 14 }}>ประเภทขยะ</h4>
          <ChartCanvas type="doughnut" data={pieChartData} height={200} options={{ cutout: '60%', plugins: { legend: { display: false } } }} />
        </div>
        <div className="glass-card" style={{ display: 'flex', flexDirection: 'column', gap: '8px' }}>
          <h4 style={{ fontSize: 14 }}>🏆 Top Branches</h4>
          {branchRanking.map((b, i) => (
            <div key={b.id} style={{ display: 'flex', justifyContent: 'space-between', fontSize: 12, padding: '4px 0', borderBottom: '1px solid #eee' }}>
              <span>{i===0?'🥇':i===1?'🥈':'🥉'} {b.name}</span>
              <strong>{b.score.toFixed(1)} kg</strong>
            </div>
          ))}
        </div>
      </div>

      {/* Export System */}
      <div className="glass-card grid-2">
        <button className="btn-outline" onClick={handleExportCSV}>📄 Export CSV</button>
        <button className="btn-primary" onClick={handleExportPDF}>📑 Export PDF</button>
      </div>
    </div>
  );
};


// --- PHASE 3: AI INTELLIGENCE PLATFORM ---
const AIUploadView = ({ onSave }) => {
  const [form, setForm] = useState({ empId: 'e1', branchId: 'hq', wasteType: 'plastic', qty: '' });
  const [photo, setPhoto] = useState(null);
  const [aiAnalyzing, setAiAnalyzing] = useState(false);
  const [verificationData, setVerificationData] = useState(null);
  
  const handlePhotoUpload = (e) => {
    const file = e.target.files?.[0] || e.dataTransfer?.files?.[0];
    if (!file) return;
    
    // Image Compression simulation (Canvas)
    const reader = new FileReader();
    reader.onload = (event) => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        const MAX_WIDTH = 800;
        const scaleSize = MAX_WIDTH / img.width;
        canvas.width = MAX_WIDTH;
        canvas.height = img.height * scaleSize;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        const compressedBase64 = canvas.toDataURL('image/jpeg', 0.7).split(',')[1];
        setPhoto(compressedBase64);
      }
      img.src = event.target.result;
    };
    reader.readAsDataURL(file);
  };

  const submitToAI = async () => {
    if (!photo || !form.qty || !form.wasteType) return alert("กรุณากรอกข้อมูลและอัพโหลดรูปให้ครบ");
    setAiAnalyzing(true);
    
    // Calculate Carbon Saved (Phase 2 logic)
    const wt = WASTE_TYPES.find(w => w.id === form.wasteType);
    const carbonSaved = parseFloat(form.qty) * wt.factor;

    // Gemini Vision API Integration (Phase 3 logic)
    if (GEMINI_KEY) {
      try {
        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_KEY}`, {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            contents: [{ parts: [
              { inline_data: { mime_type: "image/jpeg", data: photo } },
              { text: `Analyze this waste image. Selected type by user: ${wt.label}. Reply strictly in JSON: {"detected": "WasteType", "confidence": 0-100, "isMatch": true/false}` }
            ]}]
          })
        });
        const data = await res.json();
        const jsonStr = data.candidates[0].content.parts[0].text.replace(/```json|```/g, "").trim();
        const aiResult = JSON.parse(jsonStr);
        
        handleVerificationResult(aiResult, carbonSaved);
      } catch (err) {
        handleVerificationResult({ detected: "Unknown", confidence: 50, isMatch: true, error: "AI Failed" }, carbonSaved);
      }
    } else {
      // Simulation for DEMO if no API key
      setTimeout(() => {
        const isMatch = Math.random() > 0.3; // 70% chance match for demo
        const fakeResult = {
          detected: isMatch ? wt.label : WASTE_TYPES[Math.floor(Math.random()*WASTE_TYPES.length)].label,
          confidence: Math.floor(Math.random() * 20) + 75,
          isMatch: isMatch
        };
        handleVerificationResult(fakeResult, carbonSaved);
      }, 1500);
    }
  };

  const handleVerificationResult = (aiResult, carbonSaved) => {
    setAiAnalyzing(false);
    const finalRecord = {
      id: Date.now(), ts: new Date().toISOString(),
      ...form, carbonSaved, 
      empName: EMPLOYEES.find(e => e.id===form.empId).name,
      branchName: BRANCHES.find(b => b.id===form.branchId).name,
      wasteLabel: WASTE_TYPES.find(w => w.id===form.wasteType).label,
      qty: parseFloat(form.qty)
    };

    if (!aiResult.isMatch && aiResult.confidence > 70) {
      // AI Verification System - Block & Alert (Phase 3 Requirement)
      setVerificationData({ record: finalRecord, aiResult });
    } else {
      onSave(finalRecord);
    }
  };

  return (
    <div className="fade-in" style={{ display: 'flex', flexDirection: 'column', gap: '16px' }}>
      <h2 style={{ color: 'var(--primary)', borderBottom: '3px solid var(--primary)', paddingBottom: '8px' }}>🤖 AI Smart Scan</h2>
      
      <div className="glass-card">
        <label style={{ fontSize: 14, fontWeight: 700 }}>ประเภทขยะ</label>
        <div className="grid-3" style={{ marginTop: '8px' }}>
          {WASTE_TYPES.map(w => (
            <div key={w.id} onClick={() => setForm({...form, wasteType: w.id})}
                 style={{ border: `2px solid ${form.wasteType === w.id ? 'var(--primary)' : '#ddd'}`, 
                          background: form.wasteType === w.id ? '#e8f5e9' : '#fff',
                          borderRadius: '12px', padding: '10px', textAlign: 'center', cursor: 'pointer' }}>
              <div style={{ fontSize: 24 }}>{w.icon}</div>
              <div style={{ fontSize: 10, fontWeight: 700 }}>{w.label}</div>
            </div>
          ))}
        </div>
      </div>

      <div className="grid-2">
        <div className="glass-card">
          <label style={{ fontSize: 14, fontWeight: 700 }}>ปริมาณ (kg)</label>
          <input type="number" step="0.1" value={form.qty} onChange={e => setForm({...form, qty: e.target.value})}
                 style={{ width: '100%', padding: '12px', borderRadius: '10px', border: '1px solid #ccc', marginTop: '8px' }} />
        </div>
        <div className="glass-card">
          <div style={{ fontSize: 11, color: '#777' }}>สูตร: น้ำหนัก × Emission Factor</div>
          <div style={{ fontSize: 18, fontWeight: 800, color: 'var(--primary)', marginTop: '8px' }}>
            {form.qty && form.wasteType ? (parseFloat(form.qty) * WASTE_TYPES.find(w=>w.id===form.wasteType).factor).toFixed(2) : "0.00"} kgCO2e
          </div>
        </div>
      </div>

      {/* Image Upload System */}
      <div className="drop-zone" 
           onDragOver={e => e.preventDefault()} 
           onDrop={e => { e.preventDefault(); handlePhotoUpload(e); }}>
        {photo ? (
          <img src={`data:image/jpeg;base64,${photo}`} alt="preview" style={{ width: '100%', borderRadius: '10px', maxHeight: '200px', objectFit: 'cover' }} />
        ) : (
          <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center' }}>
            <span style={{ fontSize: 32 }}>📸</span>
            <p style={{ marginTop: '10px', fontWeight: 600 }}>แตะเพื่อถ่ายรูป หรือลากไฟล์มาวาง</p>
            <p style={{ fontSize: 12, color: '#666' }}>ระบบจะบีบอัดรูปภาพอัตโนมัติ</p>
          </div>
        )}
        <input type="file" accept="image/*" capture="environment" onChange={handlePhotoUpload} style={{ display: 'none' }} id="cam-upload" />
        <button onClick={() => document.getElementById('cam-upload').click()} style={{ marginTop: '10px', padding: '8px 16px', borderRadius: '20px', border: '1px solid #ccc', background: '#fff', cursor: 'pointer' }}>เลือกรูปภาพ</button>
      </div>

      <button className="btn-primary glow-box" onClick={submitToAI} disabled={aiAnalyzing} style={{ fontSize: 16 }}>
        {aiAnalyzing ? "🔄 Gemini กำลังวิเคราะห์..." : "✨ บันทึก & วิเคราะห์ด้วย AI"}
      </button>

      {/* AI Verification Modal (Phase 3 Requirement) */}
      {verificationData && (
        <div className="modal-overlay">
          <div className="modal-content text-center">
            <h3 style={{ color: 'var(--danger)', marginBottom: '10px' }}>⚠️ AI แจ้งเตือนความขัดแย้ง</h3>
            
            <div style={{ background: '#fef9e7', padding: '16px', borderRadius: '12px', textAlign: 'left', marginBottom: '20px' }}>
              <div style={{ fontSize: 14 }}>คุณเลือก: <strong>{verificationData.record.wasteLabel}</strong></div>
              <div style={{ fontSize: 14, color: 'var(--danger)', marginTop: '8px' }}>
                AI วิเคราะห์พบ: <strong>{verificationData.aiResult.detected}</strong>
              </div>
              <div style={{ marginTop: '12px' }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 12 }}>
                  <span>AI Confidence Score</span>
                  <span>{verificationData.aiResult.confidence}%</span>
                </div>
                <div className="progress-bg"><div className="progress-fill" style={{ width: `${verificationData.aiResult.confidence}%`, background: 'var(--danger)' }} /></div>
              </div>
            </div>

            <p style={{ fontSize: 13, marginBottom: '20px', color: '#555' }}>
              AI แนะนำให้เปลี่ยนประเภทขยะให้ถูกต้องเพื่อความแม่นยำของข้อมูล Carbon Credit
            </p>

            <div className="grid-2">
              <button className="btn-outline" onClick={() => setVerificationData(null)}>กลับไปแก้ไข</button>
              <button className="btn-primary" style={{ background: '#e74c3c' }} 
                      onClick={() => { onSave(verificationData.record); setVerificationData(null); }}>
                ยืนยันบันทึกตามเดิม
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
};


// --- PHASE 4: ENTERPRISE GREEN ECOSYSTEM ---
const EnterpriseEcosystemView = () => {
  // Simulate Realtime IoT Data
  const [iotBins, setIotBins] = useState([
    { id: 'b1', loc: 'HQ F1', fill: 45, type: 'Plastic' },
    { id: 'b2', loc: 'Mahidol C1', fill: 88, type: 'Food Waste' },
    { id: 'b3', loc: 'Pa Phaeng', fill: 12, type: 'Paper' }
  ]);

  useEffect(() => {
    const interval = setInterval(() => {
      setIotBins(prev => prev.map(b => ({ ...b, fill: Math.min(100, Math.max(0, b.fill + (Math.random()*10 - 5))) })));
    }, 3000);
    return () => clearInterval(interval);
  }, []);

  return (
    <div className="fade-in" style={{ display: 'flex', flexDirection: 'column', gap: '20px' }}>
      <h2 style={{ color: 'var(--primary)', borderBottom: '3px solid var(--primary)', paddingBottom: '8px' }}>🌍 Enterprise Ecosystem</h2>
      
      {/* 1. IoT Monitoring UI */}
      <div>
        <h3 style={{ fontSize: 16, marginBottom: '10px' }}>📡 Smart Bin Sensor Dashboard</h3>
        <div className="grid-3">
          {iotBins.map(bin => (
            <div key={bin.id} className="glass-card" style={{ textAlign: 'center', border: bin.fill > 80 ? '2px solid var(--danger)' : '' }}>
              <div style={{ fontSize: 12, fontWeight: 700 }}>{bin.loc}</div>
              <div style={{ fontSize: 10, color: '#666' }}>{bin.type}</div>
              <div style={{ position: 'relative', height: '60px', width: '30px', border: '2px solid #ccc', borderRadius: '4px', margin: '10px auto', overflow: 'hidden' }}>
                <div style={{ position: 'absolute', bottom: 0, width: '100%', height: `${bin.fill}%`, background: bin.fill > 80 ? 'var(--danger)' : 'var(--secondary)', transition: 'height 1s ease-in-out' }} />
              </div>
              <div style={{ fontSize: 14, fontWeight: 900, color: bin.fill > 80 ? 'var(--danger)' : 'var(--dark)' }}>{bin.fill.toFixed(0)}%</div>
            </div>
          ))}
        </div>
      </div>

      {/* 2. Carbon Credit & 3. Circular Economy */}
      <div className="grid-2">
        <div className="glass-card glow-box" style={{ background: '#1a3a2a', color: 'white' }}>
          <h3 style={{ fontSize: 14, color: '#a8e6cf' }}>💰 Carbon Credit Est.</h3>
          <div style={{ fontSize: 24, fontWeight: 900, margin: '10px 0' }}>1,250 THB</div>
          <div style={{ fontSize: 11, opacity: 0.7 }}>คำนวณจาก Carbon Saved สะสม (สมมติฐาน 50THB/ton)</div>
        </div>
        <div className="glass-card">
          <h3 style={{ fontSize: 14, color: 'var(--primary)' }}>🔄 Recovery Market</h3>
          <div style={{ fontSize: 12, marginTop: '8px' }}>พลาสติกพร้อมขาย: <strong style={{color:'var(--secondary)'}}>45 kg</strong></div>
          <div style={{ fontSize: 12 }}>ปุ๋ยอินทรีย์: <strong style={{color:'var(--secondary)'}}>120 kg</strong></div>
          <button className="btn-outline" style={{ width: '100%', padding: '4px', marginTop: '10px', fontSize: 11 }}>ติดต่อผู้รับซื้อ</button>
        </div>
      </div>

      {/* 4. AI Sustainability Coach */}
      <div className="glass-card">
        <div style={{ display: 'flex', alignItems: 'center', gap: '10px', borderBottom: '1px solid #eee', paddingBottom: '10px' }}>
          <span style={{ fontSize: 24 }}>🧠</span>
          <div>
            <h3 style={{ fontSize: 14 }}>AI Sustainability Coach</h3>
            <div style={{ fontSize: 11, color: '#666' }}>วิเคราะห์พฤติกรรม & แนะนำการลดคาร์บอน</div>
          </div>
        </div>
        <div style={{ background: '#f8f9fa', padding: '16px', borderRadius: '12px', marginTop: '12px', fontSize: 13, lineHeight: 1.6 }}>
          <strong>💡 Insight ประจำสัปดาห์:</strong><br/>
          จากข้อมูลพบว่าสาขา HQ มีปริมาณ Food Waste สูงในช่วงบ่าย AI แนะนำให้ปรับกระบวนการจัดการวัตถุดิบช่วงเที่ยง เพื่อลดขยะเศษอาหารลง 15% และสามารถแปลงเป็นปุ๋ยอินทรีย์ผ่าน Circular Economy ได้
        </div>
      </div>
    </div>
  );
};


// --- MAIN APP COMPONENT ---
const App = () => {
  const [view, setView] = useState('scan'); // dashboard, scan, enterprise
  const [records, setRecords] = useState([]);

  useEffect(() => { setRecords(loadDB()); }, []);

  const handleSaveRecord = (record) => {
    const newRecords = [record, ...records];
    setRecords(newRecords);
    saveDB(newRecords);
    alert('✅ บันทึกข้อมูลและอัปเดต Dashboard เรียบร้อยแล้ว!');
    setView('dashboard');
  };

  return (
    <div className="app-container">
      {/* App Header */}
      <header style={{ background: 'var(--primary)', color: 'white', padding: '16px 20px', position: 'sticky', top: 0, zIndex: 100, boxShadow: '0 4px 10px rgba(0,0,0,0.1)' }}>
        <div style={{ fontSize: 18, fontWeight: 900, display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
          <span>☕ Hillkoff Zero Waste</span>
          <span style={{ fontSize: 12, background: 'rgba(255,255,255,0.2)', padding: '4px 10px', borderRadius: '12px' }}>Enterprise</span>
        </div>
      </header>

      {/* Main Content Area */}
      <main style={{ padding: '20px' }}>
        {view === 'dashboard' && <DashboardView records={records} />}
        {view === 'scan' && <AIUploadView onSave={handleSaveRecord} />}
        {view === 'enterprise' && <EnterpriseEcosystemView />}
      </main>

      {/* Bottom Navigation */}
      <nav style={{ position: 'fixed', bottom: 0, width: '100%', background: 'white', display: 'flex', borderTop: '1px solid #ddd', zIndex: 100 }}>
        {[
          { id: 'dashboard', icon: '📊', label: 'Dashboard' },
          { id: 'scan', icon: '📸', label: 'AI Scan' },
          { id: 'enterprise', icon: '🌍', label: 'Ecosystem' }
        ].map(tab => (
          <div key={tab.id} onClick={() => setView(tab.id)}
               style={{ flex: 1, textAlign: 'center', padding: '12px 0', cursor: 'pointer', 
                        color: view === tab.id ? 'var(--primary)' : '#888',
                        borderTop: view === tab.id ? '3px solid var(--primary)' : '3px solid transparent' }}>
            <div style={{ fontSize: 20 }}>{tab.icon}</div>
            <div style={{ fontSize: 10, fontWeight: 700 }}>{tab.label}</div>
          </div>
        ))}
      </nav>
    </div>
  );
};

// Render App
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
